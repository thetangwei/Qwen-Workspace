<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR互动地球仪</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #ui-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            color: white;
            max-width: 300px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #4FC3F7;
        }
        
        .info-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            display: none;
            backdrop-filter: blur(10px);
            border: 2px solid #4FC3F7;
        }
        
        .marker-guide {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            pointer-events: none;
            opacity: 0.5;
        }
        
        .marker-guide img {
            width: 200px;
            height: 200px;
            border: 3px dashed #4FC3F7;
            border-radius: 10px;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <h2>正在加载AR地球仪...</h2>
        <p>请允许摄像头访问权限</p>
    </div>
    
    <!-- UI Container -->
    <div id="ui-container">
        <h1>🌍 AR互动地球仪</h1>
        <p class="info-text">
            使用摄像头识别标记卡片，在现实世界中查看3D地球仪！
        </p>
        <div class="controls">
            <button onclick="toggleRotation()">⏯️ 暂停/继续旋转</button>
            <button onclick="changeView('terrain')">🏔️ 地形模式</button>
            <button onclick="changeView('political')">🗺️ 政区模式</button>
            <button onclick="changeView('night')">🌃 夜景模式</button>
            <button onclick="showInfo()">ℹ️ 显示信息</button>
        </div>
    </div>
    
    <!-- Info Panel -->
    <div id="info-panel">
        <span id="info-text">地球直径：12,742公里 | 自转周期：24小时</span>
    </div>
    
    <!-- AR Scene -->
    <script src="https://aframe.io/components/look-at/src/index.min.js"></script>
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>
        
        <!-- Marker for AR -->
        <a-marker preset="hiro" id="marker">
            <!-- Earth Globe -->
            <a-entity id="earth" position="0 0.5 0" scale="0.5 0.5 0.5">
                <!-- Earth Sphere -->
                <a-sphere 
                    id="earth-sphere"
                    radius="1" 
                    position="0 0 0"
                    material="shader: flat; src: url('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');"
                    look-at="[camera]"
                ></a-sphere>
                
                <!-- Atmosphere -->
                <a-sphere 
                    radius="1.02" 
                    position="0 0 0"
                    material="shader: flat; transparent: true; opacity: 0.3; src: url('https://unpkg.com/three-globe/example/img/earth-night.jpg');"
                ></a-sphere>
            </a-entity>
            
            <!-- Information Labels -->
            <a-text value="AR地球仪" position="0 1.5 0" scale="2 2 2" align="center" color="#4FC3F7"></a-text>
        </a-marker>
        
        <!-- Camera -->
        <a-entity camera></a-entity>
    </a-scene>
    
    <script>
        // Hide loading screen when scene is ready
        document.querySelector('a-scene').addEventListener('loaded', function() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
        });
        
        let isRotating = true;
        let earthRotationSpeed = 0.2;
        
        // Animation loop for earth rotation
        function animate() {
            if (isRotating) {
                const earth = document.getElementById('earth');
                if (earth) {
                    earth.object3D.rotation.y += earthRotationSpeed * 0.01;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
        
        // Toggle rotation
        function toggleRotation() {
            isRotating = !isRotating;
        }
        
        // Change earth view mode
        function changeView(mode) {
            const earthSphere = document.getElementById('earth-sphere');
            const textures = {
                'terrain': 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
                'political': 'https://unpkg.com/three-globe/example/img/earth-topology.png',
                'night': 'https://unpkg.com/three-globe/example/img/earth-night.jpg'
            };
            
            if (earthSphere && textures[mode]) {
                earthSphere.setAttribute('material', 'src', textures[mode]);
                showPanel(`已切换到${mode === 'terrain' ? '地形' : mode === 'political' ? '政区' : '夜景'}模式`);
            }
        }
        
        // Show information
        function showInfo() {
            const facts = [
                "地球直径：12,742公里",
                "地球年龄：约45亿年",
                "表面积：5.1亿平方公里",
                "海洋占比：71%",
                "自转周期：23小时56分4秒",
                "公转周期：365.25天"
            ];
            
            const randomFact = facts[Math.floor(Math.random() * facts.length)];
            showPanel(randomFact);
        }
        
        // Show info panel
        function showPanel(text) {
            const panel = document.getElementById('info-panel');
            const infoText = document.getElementById('info-text');
            infoText.textContent = text;
            panel.style.display = 'block';
            
            setTimeout(() => {
                panel.style.display = 'none';
            }, 3000);
        }
        
        // Handle marker visibility
        const marker = document.getElementById('marker');
        marker.addEventListener('markerFound', () => {
            console.log('Marker found!');
            showPanel('🎉 发现标记！地球仪已加载');
        });
        
        marker.addEventListener('markerLost', () => {
            console.log('Marker lost!');
        });
        
        // Print marker for users
        console.log('请打印或显示Hiro标记图片以启动AR体验');
        console.log('Hiro标记图片地址：https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png');
    </script>
</body>
</html>
